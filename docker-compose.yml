services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: collab-editor
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/collab-editor
      REDIS_URL: redis://redis:6379
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: docker-dev-secret-change-in-production
      NEXT_PUBLIC_WS_URL: ws://localhost:1234
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - full

  ws:
    build: .
    command: ["node", "--import", "tsx", "server/hocuspocus.ts"]
    ports:
      - "1234:1234"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/collab-editor
      REDIS_URL: redis://redis:6379
      HOCUSPOCUS_PORT: "1234"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - full

volumes:
  mongo-data:
  redis-data:
